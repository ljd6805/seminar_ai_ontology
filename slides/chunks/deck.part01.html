<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Ontology 지식관리 방법론</title>
<meta name="description" content="온톨로지 지식관리 방법론 입문 교안 슬라이드">
<style>
:root{
  --bg:#080b18;--bg2:#10162b;--panel:rgba(255,255,255,.075);--panel2:rgba(255,255,255,.115);
  --text:#f4f7fb;--muted:#9aa8c7;--line:rgba(255,255,255,.16);
  --violet:#a78bfa;--mint:#55f0c2;--amber:#ffd166;--coral:#ff6b6b;--blue:#67e8f9;
  --shadow:0 24px 80px rgba(0,0,0,.45);--r:26px;
}
*{box-sizing:border-box} html,body{margin:0;width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR","Apple SD Gothic Neo",Arial,sans-serif;}
body:before{content:"";position:fixed;inset:0;background:radial-gradient(900px 600px at 10% 10%,rgba(167,139,250,.22),transparent 60%),radial-gradient(800px 540px at 90% 20%,rgba(85,240,194,.16),transparent 60%),linear-gradient(145deg,#060814,#10162b 55%,#070a15);z-index:0;}
.deck{position:relative;width:100vw;height:100vh;z-index:1;}
.slide{display:none;position:absolute;inset:0;padding:42px 58px 34px;overflow:hidden;}
.slide.active{display:flex;flex-direction:column;}
.slide:after{content:"";position:absolute;right:-180px;bottom:-220px;width:580px;height:580px;border-radius:50%;background:radial-gradient(circle,rgba(167,139,250,.18),transparent 65%);z-index:-1;}
.slide-head{display:flex;justify-content:space-between;align-items:center;color:var(--muted);font-size:15px;letter-spacing:.08em;text-transform:uppercase;margin-bottom:10px;}
.num{font-variant-numeric:tabular-nums;color:rgba(255,255,255,.4)}
h1{font-size:clamp(34px,5.2vw,66px);line-height:1.03;margin:0 0 24px;letter-spacing:-.055em;max-width:1180px;}
.content{flex:1;display:flex;flex-direction:column;justify-content:center;gap:20px;min-height:0;}
.cover h1{font-size:clamp(52px,7vw,92px);max-width:1000px}.hero p{font-size:clamp(30px,4.8vw,70px);line-height:1.08;margin:0}.hero b{color:var(--mint)}.journey{margin-top:34px;color:var(--muted);font-size:24px;border:1px solid var(--line);border-radius:999px;padding:16px 24px;display:inline-block;background:rgba(255,255,255,.05)}
.section{align-items:center;text-align:center}.section h1{font-size:clamp(56px,8vw,110px);margin:auto auto 24px}.section-mark{font-size:clamp(24px,3vw,40px);color:var(--mint);padding:22px 32px;border:1px solid rgba(85,240,194,.35);border-radius:999px;background:rgba(85,240,194,.06)}
.closing{align-items:center;text-align:center}.qa p{font-size:42px;line-height:1.25}.qa b{font-size:34px;color:var(--mint)}
.badge{position:absolute;right:58px;top:78px;padding:8px 14px;border-radius:999px;font-weight:800;font-size:13px;letter-spacing:.08em;background:rgba(255,255,255,.1);border:1px solid var(--line)}.badge.demo{color:#07130f;background:var(--mint)}.badge.read{color:#1b1100;background:var(--amber)}.badge.appendix{color:#fff;background:rgba(167,139,250,.45)}
.source{position:absolute;left:58px;bottom:20px;color:rgba(255,255,255,.48);font-size:12px;margin:0}.note{color:var(--muted);font-size:20px;line-height:1.55;margin:0;max-width:1120px}.lead{font-size:28px;line-height:1.42;color:#dbe7ff}.mini{color:var(--muted);font-size:20px}.big-word{font-size:120px;font-weight:900;letter-spacing:-.07em;color:var(--amber);text-shadow:0 12px 60px rgba(255,209,102,.25)}
.cards{display:grid;gap:18px}.cards.tri{grid-template-columns:repeat(3,1fr)}.cards.quad{grid-template-columns:repeat(4,1fr)}.cards.five{grid-template-columns:repeat(5,1fr)}.cards.six{grid-template-columns:repeat(3,1fr)}.cards.stack{grid-template-columns:1fr}.card{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:22px;box-shadow:var(--shadow);min-height:138px;backdrop-filter:blur(8px)}.card h3{font-size:25px;margin:0 0 12px;color:#fff;letter-spacing:-.03em}.card p{font-size:19px;line-height:1.45;color:#cbd5e8;margin:0}.card.amber{border-color:rgba(255,209,102,.35)}.card.mint{border-color:rgba(85,240,194,.35)}.card.violet{border-color:rgba(167,139,250,.4)}.card.blue{border-color:rgba(103,232,249,.35)}.card.coral{border-color:rgba(255,107,107,.4)}
.two{display:grid;grid-template-columns:1fr 1fr;gap:28px;align-items:center}.three{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}.flow{display:flex;align-items:stretch;gap:12px}.flow.wide{gap:10px}.flow-step{flex:1;background:var(--panel);border:1px solid var(--line);border-radius:22px;padding:20px;display:flex;flex-direction:column;justify-content:center;min-height:130px}.flow-step b{font-size:24px;color:var(--mint)}.flow-step small{font-size:17px;color:#c8d1e7;margin-top:8px}.flow-arrow{align-self:center;font-size:30px;color:var(--amber)}
.chips{display:flex;gap:14px;flex-wrap:wrap}.chips span,.ontology-pillars span{border:1px solid var(--line);background:var(--panel);border-radius:999px;padding:13px 19px;font-weight:800;color:#eaf2ff}.ontology-pillars{display:flex;gap:18px;justify-content:center;flex-wrap:wrap}.ontology-pillars span{font-size:24px;border-color:rgba(85,240,194,.35)}
blockquote{border-left:7px solid var(--mint);padding:16px 0 16px 28px;margin:0;background:linear-gradient(90deg,rgba(85,240,194,.08),transparent);border-radius:0 22px 22px 0}blockquote p{font-size:clamp(28px,3vw,44px);line-height:1.24;margin:0;font-weight:800;letter-spacing:-.035em}blockquote cite{display:block;margin-top:14px;color:var(--muted);font-style:normal;font-size:18px}
.tbl{width:100%;border-collapse:separate;border-spacing:0 10px;font-size:20px}.tbl th{color:var(--mint);text-align:left;font-size:16px;text-transform:uppercase;letter-spacing:.08em;padding:0 14px}.tbl td{background:var(--panel);border-top:1px solid var(--line);border-bottom:1px solid var(--line);padding:14px 16px;line-height:1.35}.tbl td:first-child{border-left:1px solid var(--line);border-radius:16px 0 0 16px;color:#fff;font-weight:800}.tbl td:last-child{border-right:1px solid var(--line);border-radius:0 16px 16px 0}.tbl.compact{font-size:18px}.tbl.compact td{padding:11px 14px}
.code-card{background:#050711;border:1px solid rgba(103,232,249,.25);border-radius:22px;box-shadow:var(--shadow);overflow:hidden}.code-title{padding:12px 16px;color:var(--blue);font-weight:800;border-bottom:1px solid rgba(255,255,255,.08);background:rgba(103,232,249,.06)}pre{margin:0;padding:18px;white-space:pre-wrap;font-family:"SFMono-Regular","Cascadia Code","Consolas",monospace;font-size:18px;line-height:1.45;color:#d8fff6}.code-card.csv code{color:#fff3c4}.code-card.sparql code{color:#e9ddff}.code-card.json code{color:#d4f7ff}
