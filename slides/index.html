<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ontology 지식관리 방법론</title>
  <style>
    html,body{height:100%;margin:0;background:#080b18;color:#f4f7fb;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR",sans-serif;display:grid;place-items:center}
    .loader{max-width:720px;text-align:center;padding:48px;border:1px solid rgba(255,255,255,.16);border-radius:28px;background:rgba(255,255,255,.06);box-shadow:0 24px 80px rgba(0,0,0,.45)}
    h1{font-size:42px;line-height:1.1;margin:0 0 16px;letter-spacing:-.04em}p{color:#9aa8c7;font-size:18px;line-height:1.6}.bar{height:6px;background:rgba(255,255,255,.12);border-radius:999px;overflow:hidden;margin-top:24px}.bar span{display:block;height:100%;width:35%;background:linear-gradient(90deg,#55f0c2,#a78bfa);border-radius:999px;animation:load 1.2s ease-in-out infinite alternate}@keyframes load{to{width:100%}}
  </style>
</head>
<body>
  <div class="loader">
    <h1>Ontology 지식관리 방법론</h1>
    <p>슬라이드 자료를 불러오는 중입니다. 외부 CDN 없이 저장소 내부 정적 파일만 사용합니다.</p>
    <div class="bar"><span></span></div>
  </div>
  <script>
    const parts = Array.from({length: 13}, (_, i) => `chunks/deck.part${String(i + 1).padStart(2, '0')}.html`);
    Promise.all(parts.map(path => fetch(path).then(r => {
      if (!r.ok) throw new Error(`${path}: ${r.status}`);
      return r.text();
    }))).then(chunks => {
      document.open();
      document.write(chunks.join(''));
      document.close();
    }).catch(err => {
      document.querySelector('.loader').innerHTML = `<h1>슬라이드 로드 실패</h1><p>${err.message}</p>`;
    });
  </script>
</body>
</html>
